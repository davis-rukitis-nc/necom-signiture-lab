<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NECom Email Signature Lab</title>
    <meta
      name="description"
      content="A one-page email signature builder for NECom and event-branded signatures."
    />
    <link
      rel="icon"
      href="https://rimirigamarathon.com/wp-content/uploads/2025/11/NECOM-fav.png"
      type="image/png"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#builder">Skip to builder</a>

    <main class="app-shell">
      <header class="topbar" aria-label="Application header">
        <a class="brand-lockup" href="/" aria-label="NECom Email Signature Lab">
          <img
            class="brand-lockup__logo"
            src="https://rimirigamarathon.com/wp-content/uploads/2026/02/necom-1.png"
            alt="NECom"
          />
          <span>Email Signature Lab</span>
        </a>

        <div class="language-switch" aria-label="Language">
          <button class="language-switch__button is-active" type="button" data-language="en">
            EN
          </button>
          <button class="language-switch__button" type="button" data-language="lv">
            LV
          </button>
        </div>
      </header>

      <section class="workspace">
        <section class="panel builder-panel" id="builder" aria-label="Signature builder">
          <div class="builder-top">
            <div class="preset-grid" id="presetGrid" aria-label="Brand preset"></div>
            <button class="ghost-button reset-button" id="resetButton" type="button" data-i18n="reset">
              Reset
            </button>
          </div>

          <section class="control-group compact-group" aria-labelledby="rows-title">
            <div class="section-title-row">
              <h2 id="rows-title" data-i18n="rowsTitle">Rows</h2>
              <div class="preset-actions" aria-label="Layout presets">
                <button type="button" class="tiny-button" data-row-preset="full" data-i18n="presetFull">Full</button>
                <button type="button" class="tiny-button" data-row-preset="compact" data-i18n="presetCompact">Compact</button>
                <button type="button" class="tiny-button" data-row-preset="minimal" data-i18n="presetMinimal">Minimal</button>
              </div>
            </div>

            <div class="row-toggle-grid" id="rowToggleGrid">
              <label class="chip-toggle">
                <input id="rowLogoInput" type="checkbox" />
                <span data-i18n="rowLogo">Logo</span>
              </label>
              <label class="chip-toggle">
                <input id="rowContactInput" type="checkbox" />
                <span data-i18n="rowContact">Contact</span>
              </label>
              <label class="chip-toggle">
                <input id="rowAddressInput" type="checkbox" />
                <span data-i18n="rowAddress">Address</span>
              </label>
              <label class="chip-toggle">
                <input id="rowWebsiteInput" type="checkbox" />
                <span data-i18n="rowWebsite">Website</span>
              </label>
              <label class="chip-toggle">
                <input id="rowInfoInput" type="checkbox" />
                <span data-i18n="rowInfo">Info text</span>
              </label>
              <label class="chip-toggle">
                <input id="rowBannerInput" type="checkbox" />
                <span data-i18n="rowBanner">Banner</span>
              </label>
            </div>
          </section>

          <section class="control-group" aria-labelledby="person-title">
            <h2 id="person-title" data-i18n="personTitle">Person</h2>
            <div class="form-grid">
              <label class="field">
                <span data-i18n="nameLabel">Name</span>
                <input id="nameInput" autocomplete="name" type="text" />
              </label>
              <label class="field">
                <span data-i18n="titleLabel">Job title</span>
                <input id="titleInput" autocomplete="organization-title" type="text" />
              </label>
              <label class="field">
                <span data-i18n="phoneLabel">Phone</span>
                <input id="phoneInput" autocomplete="tel" type="tel" />
              </label>
              <label class="field">
                <span data-i18n="emailLabel">Email</span>
                <input id="emailInput" autocomplete="email" type="email" />
              </label>
            </div>
            <label class="toggle-row tight-toggle">
              <input id="showEmailInput" type="checkbox" />
              <span data-i18n="showEmailLabel">Show email address</span>
            </label>
          </section>

          <section class="control-group" aria-labelledby="details-title">
            <h2 id="details-title" data-i18n="detailsTitle">Details</h2>
            <div class="form-grid">
              <label class="field">
                <span data-i18n="address1Label">Address line 1</span>
                <input id="address1Input" type="text" />
              </label>
              <label class="field">
                <span data-i18n="address2Label">Address line 2</span>
                <input id="address2Input" type="text" />
              </label>
              <label class="field">
                <span data-i18n="websiteLabelLabel">Website label</span>
                <input id="websiteLabelInput" type="text" />
              </label>
              <label class="field">
                <span data-i18n="websiteUrlLabel">Website URL</span>
                <input id="websiteUrlInput" type="url" />
              </label>
            </div>
            <label class="field info-field">
              <span data-i18n="infoTextLabel">Info text</span>
              <textarea id="infoTextInput" rows="4"></textarea>
            </label>
          </section>

          <section class="control-group" aria-labelledby="logo-title">
            <h2 id="logo-title" data-i18n="logoTitle">Logo</h2>
            <div class="form-grid">
              <label class="field">
                <span data-i18n="logoVariantLabel">Logo version</span>
                <select id="logoVariantInput"></select>
              </label>
              <label class="field">
                <span data-i18n="logoUrlLabel">Logo URL</span>
                <input id="logoUrlInput" type="url" />
              </label>
            </div>
            <div class="range-grid">
              <label class="range-field">
                <span><span data-i18n="logoSizeLabel">Logo size</span> <strong id="logoSizeValue"></strong></span>
                <input id="logoSizeInput" min="40" max="160" step="2" type="range" />
              </label>
              <label class="color-field">
                <span data-i18n="minimalColorLabel">Minimal color</span>
                <input id="minimalColorInput" type="color" />
              </label>
            </div>
          </section>

          <section class="control-group" aria-labelledby="style-title">
            <h2 id="style-title" data-i18n="styleTitle">Style</h2>
            <div class="style-grid">
              <label class="field">
                <span data-i18n="signatureStyleLabel">Signature design</span>
                <select id="signatureStyleInput">
                  <option value="classic" data-i18n="styleClassic">Classic</option>
                  <option value="modern" data-i18n="styleModern">Modern</option>
                </select>
              </label>
              <label class="color-field">
                <span data-i18n="accentColorLabel">Accent color</span>
                <input id="accentColorInput" type="color" />
              </label>
              <label class="color-field">
                <span data-i18n="textColorLabel">Text color</span>
                <input id="textColorInput" type="color" />
              </label>
            </div>
            <label class="range-field">
              <span><span data-i18n="signatureWidthLabel">Signature width</span> <strong id="signatureWidthValue"></strong></span>
              <input id="signatureWidthInput" min="300" max="620" step="10" type="range" />
            </label>
          </section>

          <section class="control-group" aria-labelledby="banner-title">
            <h2 id="banner-title" data-i18n="bannerTitle">Banner</h2>
            <div class="form-grid">
              <label class="field">
                <span data-i18n="bannerUrlLabel">Banner image URL</span>
                <input id="bannerUrlInput" type="url" placeholder="https://..." />
              </label>
              <label class="field">
                <span data-i18n="bannerLinkLabel">Banner link URL</span>
                <input id="bannerLinkInput" type="url" placeholder="https://..." />
              </label>
              <label class="field">
                <span data-i18n="bannerPositionLabel">Banner position</span>
                <select id="bannerPositionInput">
                  <option value="top" data-i18n="bannerTop">Top</option>
                  <option value="afterHeader" data-i18n="bannerAfterHeader">After name/logo</option>
                  <option value="beforeInfo" data-i18n="bannerBeforeInfo">Before info text</option>
                  <option value="bottom" data-i18n="bannerBottom">Bottom</option>
                </select>
              </label>
              <label class="range-field">
                <span><span data-i18n="bannerSpacerLabel">Banner spacer</span> <strong id="bannerSpacerValue"></strong></span>
                <input id="bannerSpacerInput" min="0" max="32" step="2" type="range" />
              </label>
            </div>
          </section>

          <div class="action-row">
            <button class="primary-button" id="copyRenderedButton" type="button" data-i18n="copyRendered">
              Copy for Gmail
            </button>
            <button class="secondary-button" id="copyHtmlButton" type="button" data-i18n="copyHtml">
              Copy HTML
            </button>
            <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
          </div>
        </section>

        <section class="preview-panel" aria-label="Email preview">
          <article class="gmail-card">
            <header class="gmail-card__bar">
              <div class="gmail-window-dots" aria-hidden="true">
                <span></span><span></span><span></span>
              </div>
              <p id="emailSubject">New message</p>
              <button class="icon-button" id="shuffleEmailButton" type="button" aria-label="Shuffle preview email" title="Shuffle preview email">
                <span aria-hidden="true">↻</span>
              </button>
            </header>
            <div class="gmail-card__meta">
              <span id="previewFrom"></span>
            </div>
            <div class="gmail-card__body" id="previewEmailBody"></div>
            <div class="gmail-card__signature" id="signaturePreview"></div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
